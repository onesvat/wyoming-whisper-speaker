services:
  wyoming-whisper-speaker-cpu:
    build:
      context: .
      dockerfile: Dockerfile.cpu
    container_name: wyoming-whisper-speaker
    volumes:
      - ./volumes/whisper:/data
      - ./volumes/voices:/data/voices
    environment:
      - TZ=Europe/Istanbul
      - VOICES_DIR=/data/voices
      - SPEAKER_THRESHOLD=0.80
      - VOICE_SCAN_INTERVAL=10
      - WHISPER_MODEL=${WHISPER_MODEL:-Systran/faster-whisper-large-v3}
    restart: unless-stopped
    ports:
      - 10300:10300
    command:
      [
        "uv", "run", "wyoming-whisper-speaker",
        "--model", "${WHISPER_MODEL:-Systran/faster-whisper-large-v3}",
        "--uri", "tcp://0.0.0.0:10300",
        "--data-dir", "/data",
        "--beam-size", "5",
        "--language", "tr",
        "--device", "cpu",
        "--compute-type", "int8"
      ]
    profiles:
      - cpu

  wyoming-whisper-speaker-gpu:
    build:
      context: .
      dockerfile: Dockerfile.gpu
    container_name: wyoming-whisper-speaker
    volumes:
      - ./volumes/whisper:/data
      - ./volumes/voices:/data/voices
    environment:
      - TZ=Europe/Istanbul
      - VOICES_DIR=/data/voices
      - SPEAKER_THRESHOLD=0.80
      - VOICE_SCAN_INTERVAL=10
      - WHISPER_MODEL=${WHISPER_MODEL:-Systran/faster-whisper-large-v3}
    restart: unless-stopped
    ports:
      - 10300:10300
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities:
                - gpu
    command:
      [
        "uv", "run", "wyoming-whisper-speaker",
        "--model", "${WHISPER_MODEL:-Systran/faster-whisper-large-v3}",
        "--uri", "tcp://0.0.0.0:10300",
        "--data-dir", "/data",
        "--beam-size", "5",
        "--language", "tr",
        "--device", "cuda",
        "--compute-type", "int8"
      ]
    profiles:
      - gpu